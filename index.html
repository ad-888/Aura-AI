<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura-AI</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Aura-AI">
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js');</script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:#0a0a0f;color:#e8e4dc;font-family:'DM Mono',monospace;display:flex;flex-direction:column;min-height:100vh}
header{padding:16px 24px;background:rgba(10,10,15,0.95);border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo-name{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300;letter-spacing:0.08em}
.logo-name span{color:#c9a96e;font-style:italic}
.logo-tag{font-size:0.55rem;color:rgba(232,228,220,0.4);letter-spacing:0.2em;text-transform:uppercase;margin-left:8px}
.status{display:flex;align-items:center;gap:6px;font-size:0.65rem;color:rgba(232,228,220,0.4)}
.dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:220px;background:#111118;border-right:1px solid rgba(255,255,255,0.07);padding:16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;flex-shrink:0}
.sidebar-label{font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(232,228,220,0.4);margin-bottom:4px}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mode-btn{background:#16161f;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:10px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all 0.2s;color:#e8e4dc}
.mode-btn.active{background:rgba(201,169,110,0.15);border-color:rgba(201,169,110,0.4)}
.mode-btn span:first-child{font-size:1.1rem}
.mode-btn span:last-child{font-size:0.55rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(232,228,220,0.5)}
.mode-btn.active span:last-child{color:#c9a96e}
.qa-btn{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:0.7rem;color:rgba(232,228,220,0.5);border:none;background:none;width:100%;text-align:left;transition:all 0.2s}
.qa-btn:hover{background:rgba(201,169,110,0.08);color:#e8e4dc}
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.chat-messages::-webkit-scrollbar{width:3px}
.chat-messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:40px}
.orb{width:64px;height:64px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(201,169,110,0.5),rgba(201,169,110,0.05));border:1px solid rgba(201,169,110,0.3);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-style:italic;color:#c9a96e;animation:float 3s ease-in-out infinite;box-shadow:0 0 40px rgba(201,169,110,0.15)}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.welcome h2{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300}
.welcome p{font-size:0.7rem;color:rgba(232,228,220,0.5);line-height:1.8;max-width:280px}
.msg{display:flex;gap:12px}
.msg.user{flex-direction:row-reverse}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:0.8rem;border:1px solid rgba(255,255,255,0.1)}
.msg.ai .avatar{background:rgba(201,169,110,0.15);border-color:rgba(201,169,110,0.3);color:#c9a96e;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem}
.msg.user .avatar{background:rgba(123,158,166,0.15)}
.bubble{max-width:70%;padding:12px 16px;border-radius:14px;font-size:0.78rem;line-height:1.7}
.msg.ai .bubble{background:#16161f;border:1px solid rgba(255,255,255,0.07);border-bottom-left-radius:3px}
.msg.user .bubble{background:rgba(201,169,110,0.15);border:1px solid rgba(201,169,110,0.2);border-bottom-right-radius:3px}
.msg-time{font-size:0.55rem;color:rgba(232,228,220,0.3);margin-top:4px}
.typing{display:none;gap:5px;padding:12px 16px;background:#16161f;border:1px solid rgba(255,255,255,0.07);border-radius:14px;border-bottom-left-radius:3px;width:fit-content}
.typing.show{display:flex}
.typing-dot{width:5px;height:5px;border-radius:50%;background:#c9a96e;animation:bounce 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:0.2s}
.typing-dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,100%{transform:translateY(0);opacity:0.4}50%{transform:translateY(-5px);opacity:1}}
.input-area{padding:14px 18px;border-top:1px solid rgba(255,255,255,0.07);background:#111118;flex-shrink:0}
.input-row{display:flex;gap:8px;align-items:flex-end}
textarea{flex:1;background:#0a0a0f;border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#e8e4dc;font-family:'DM Mono',monospace;font-size:0.76rem;padding:10px 14px;resize:none;min-height:42px;max-height:120px;line-height:1.5}
textarea::placeholder{color:rgba(232,228,220,0.3)}
textarea:focus{outline:none;border-color:rgba(201,169,110,0.4)}
.send{width:42px;height:42px;border-radius:10px;background:rgba(201,169,110,0.15);border:1px solid rgba(201,169,110,0.3);color:#c9a96e;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
.send:hover{background:rgba(201,169,110,0.25)}
.chips{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.chip{padding:4px 10px;border-radius:16px;background:#16161f;border:1px solid rgba(255,255,255,0.07);font-size:0.6rem;color:rgba(232,228,220,0.5);cursor:pointer;transition:all 0.2s}
.chip:hover{border-color:rgba(201,169,110,0.3);color:#c9a96e}
.typing-wrap{padding:0 20px 8px;display:none}
.typing-wrap.show{display:flex;gap:12px;align-items:flex-end}
@media(max-width:768px){.sidebar{display:none}.layout{flex-direction:column}}
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:baseline">
    <div class="logo-name"><span>Aura</span>-AI</div>
    <div class="logo-tag">Assistant Personnel</div>
  </div>
  <div class="status"><div class="dot"></div>En ligne · Adrien</div>
</header>
<div class="layout">
  <aside class="sidebar">
    <div>
      <div class="sidebar-label">Mode</div>
      <div class="mode-grid">
        <button class="mode-btn active" onclick="setMode('general',this)"><span>✦</span><span>Général</span></button>
        <button class="mode-btn" onclick="setMode('pro',this)"><span>💼</span><span>Pro</span></button>
        <button class="mode-btn" onclick="setMode('creative',this)"><span>✍️</span><span>Créatif</span></button>
        <button class="mode-btn" onclick="setMode('plan',this)"><span>🗓</span><span>Planif.</span></button>
      </div>
    </div>
    <div>
      <div class="sidebar-label">Actions rapides</div>
      <button class="qa-btn" onclick="ins('Rédige un email professionnel pour ')">✉️ Email professionnel</button>
      <button class="qa-btn" onclick="ins('Planifie ma journée de demain : ')">☀️ Planifier ma journée</button>
      <button class="qa-btn" onclick="ins('Résume ce texte en points clés : ')">📋 Résumer un texte</button>
      <button class="qa-btn" onclick="ins('Génère des idées créatives pour ')">💡 Brainstorming</button>
      <button class="qa-btn" onclick="ins('Corrige et améliore ce texte : ')">✏️ Corriger un texte</button>
      <button class="qa-btn" onclick="ins('Prépare une présentation sur ')">📊 Présentation</button>
    </div>
    <div>
      <div class="sidebar-label">Contexte personnel</div>
      <button class="qa-btn" onclick="ins('En tant que formateur à l\'École Black Jack, aide-moi à ')">🎓 École Black Jack</button>
      <button class="qa-btn" onclick="ins('Pour la loge Parfaite Amitié, aide-moi à ')">🔷 Loge Parfaite Amitié</button>
    </div>
  </aside>
  <div class="chat-area">
    <div class="chat-messages" id="msgs">
      <div class="welcome" id="welcome">
        <div class="orb">A</div>
        <h2>Bonjour, Adrien.</h2>
        <p>Je suis Aura, votre assistant personnel. Comment puis-je vous aider aujourd'hui ?</p>
      </div>
    </div>
    <div class="typing-wrap" id="typingWrap">
      <div class="avatar" style="background:rgba(201,169,110,0.15);border-color:rgba(201,169,110,0.3);color:#c9a96e;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid">A</div>
      <div class="typing show"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="inp" placeholder="Posez votre question à Aura…" rows="1" onkeydown="handleKey(event)" oninput="resize(this)"></textarea>
        <button class="send" onclick="send()">↑</button>
      </div>
      <div class="chips">
        <div class="chip" onclick="ins('Résume en 5 points ')">Résumer</div>
        <div class="chip" onclick="ins('Traduis en anglais : ')">Traduire</div>
        <div class="chip" onclick="ins('Améliore ce texte : ')">Améliorer</div>
        <div class="chip" onclick="ins('Crée un plan pour ')">Planifier</div>
      </div>
    </div>
  </div>
</div>
<script>
const KEY='REDACTED';
const MODES={
  general:{label:'Mode Général',sys:'Tu es Aura, assistant personnel élégant pour Adrien. Réponds en français, avec clarté et bienveillance. Adrien est formateur à l\'École Black Jack et membre de la loge Parfaite Amitié. Sois concis et chaleur​​​​​​​​​​​​​​​​
