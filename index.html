<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura-AI</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Aura-AI">
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js');</script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{background:#0a0a0f;color:#e8e4dc;font-family:'DM Mono',monospace;display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{padding:14px 20px;background:#0a0a0f;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;letter-spacing:0.08em}
.logo span{color:#c9a96e;font-style:italic}
.logo-tag{font-size:0.5rem;color:rgba(232,228,220,0.4);letter-spacing:0.2em;text-transform:uppercase;margin-left:8px}
.status{display:flex;align-items:center;gap:6px;font-size:0.6rem;color:rgba(232,228,220,0.4)}
.dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.layout{display:flex;flex:1;overflow:hidden;min-height:0}
.sidebar{width:200px;background:#111118;border-right:1px solid rgba(255,255,255,0.07);padding:14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;flex-shrink:0}
.slabel{font-size:0.5rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(232,228,220,0.4);margin-bottom:2px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.mbtn{background:#16161f;border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:8px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all 0.2s;color:#e8e4dc}
.mbtn.active{background:rgba(201,169,110,0.15);border-color:rgba(201,169,110,0.4)}
.mbtn .mi{font-size:1rem}
.mbtn .ml{font-size:0.5rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(232,228,220,0.4)}
.mbtn.active .ml{color:#c9a96e}
.qbtn{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:0.65rem;color:rgba(232,228,220,0.5);border:none;background:none;width:100%;text-align:left;transition:all 0.2s}
.qbtn:hover{background:rgba(201,169,110,0.08);color:#e8e4dc}
.chat{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;min-height:0}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:20px}
.orb{width:60px;height:60px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(201,169,110,0.5),rgba(201,169,110,0.05));border:1px solid rgba(201,169,110,0.3);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-style:italic;color:#c9a96e;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.welcome h2{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300}
.welcome p{font-size:0.65rem;color:rgba(232,228,220,0.5);line-height:1.8;max-width:260px}
.msg{display:flex;gap:10px}
.msg.user{flex-direction:row-reverse}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:0.75rem;border:1px solid rgba(255,255,255,0.1)}
.msg.ai .av{background:rgba(201,169,110,0.15);border-color:rgba(201,169,110,0.3);color:#c9a96e;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.9rem}
.msg.user .av{background:rgba(123,158,166,0.15)}
.bub{max-width:75%;padding:10px 14px;border-radius:12px;font-size:0.75rem;line-height:1.7}
.msg.ai .bub{background:#16161f;border:1px solid rgba(255,255,255,0.07);border-bottom-left-radius:3px}
.msg.user .bub{background:rgba(201,169,110,0.15);border:1px solid rgba(201,169,110,0.2);border-bottom-right-radius:3px}
.mtime{font-size:0.5rem;color:rgba(232,228,220,0.3);margin-top:3px}
.twrap{padding:0 16px 6px;display:none}
.twrap.show{display:flex;gap:10px;align-items:flex-end}
.typing{display:flex;gap:4px;padding:10px 14px;background:#16161f;border:1px solid rgba(255,255,255,0.07);border-radius:12px;border-bottom-left-radius:3px}
.td{width:4px;height:4px;border-radius:50%;background:#c9a96e;animation:bounce 1.2s infinite}
.td:nth-child(2){animation-delay:0.2s}
.td:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,100%{transform:translateY(0);opacity:0.4}50%{transform:translateY(-4px);opacity:1}}
.iarea{padding:12px 16px;border-top:1px solid rgba(255,255,255,0.07);background:#111118;flex-shrink:0}
.irow{display:flex;gap:8px;align-items:flex-end}
textarea{flex:1;background:#0a0a0f;border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#e8e4dc;font-family:'DM Mono',monospace;font-size:0.74rem;padding:10px 12px;resize:none;min-height:40px;max-height:100px;line-height:1.5}
textarea::placeholder{color:rgba(232,228,220,0.3)}
textarea:focus{outline:none;border-color:rgba(201,169,110,0.4)}
.sbtn{width:40px;height:40px;border-radius:10px;background:rgba(201,169,110,0.15);border:1px solid rgba(201,169,110,0.3);color:#c9a96e;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
.sbtn:hover{background:rgba(201,169,110,0.25)}
.chips{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.chip{padding:3px 9px;border-radius:14px;background:#16161f;border:1px solid rgba(255,255,255,0.07);font-size:0.55rem;color:rgba(232,228,220,0.5);cursor:pointer;transition:all 0.2s}
.chip:hover{border-color:rgba(201,169,110,0.3);color:#c9a96e}
@media(max-width:600px){.sidebar{display:none}}
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:baseline">
    <div class="logo"><span>Aura</span>-AI</div>
    <div class="logo-tag">Assistant Personnel</div>
  </div>
  <div class="status"><div class="dot"></div>En ligne · Adrien</div>
</header>
<div class="layout">
  <aside class="sidebar">
    <div>
      <div class="slabel">Mode</div>
      <div class="mgrid">
        <button class="mbtn active" onclick="setMode('general',this)"><span class="mi">✦</span><span class="ml">Général</span></button>
        <button class="mbtn" onclick="setMode('pro',this)"><span class="mi">💼</span><span class="ml">Pro</span></button>
        <button class="mbtn" onclick="setMode('creative',this)"><span class="mi">✍️</span><span class="ml">Créatif</span></button>
        <button class="mbtn" onclick="setMode('plan',this)"><span class="mi">🗓</span><span class="ml">Planif.</span></button>
      </div>
    </div>
    <div>
      <div class="slabel">Actions rapides</div>
      <button class="qbtn" onclick="ins('Rédige un email professionnel pour ')">✉️ Email professionnel</button>
      <button class="qbtn" onclick="ins('Planifie ma journée de demain : ')">☀️ Planifier ma journée</button>
      <button class="qbtn" onclick="ins('Résume ce texte en points clés : ')">📋 Résumer un texte</button>
      <button class="qbtn" onclick="ins('Génère des idées pour ')">💡 Brainstorming</button>
      <button class="qbtn" onclick="ins('Corrige et améliore ce texte : ')">✏️ Corriger un texte</button>
    </div>
    <div>
      <div class="slabel">Contexte personnel</div>
      <button class="qbtn" onclick="ins('En tant que formateur à l\'École Black Jack, aide-moi à ')">🎓 École Black Jack</button>
      <button class="qbtn" onclick="ins('Pour la loge Parfaite Amitié, aide-moi à ')">🔷 Loge Parfaite Amitié</button>
    </div>
  </aside>
  <div class="chat">
    <div class="msgs" id="msgs">
      <div class="welcome" id="welcome">
        <div class="orb">A</div>
        <h2>Bonjour, Adrien.</h2>
        <p>Je suis Aura, votre assistant personnel. Comment puis-je vous aider aujourd'hui ?</p>
      </div>
    </div>
    <div class="twrap" id="tw">
      <div class="av" style="background:rgba(201,169,110,0.15);border-color:rgba(201,169,110,0.3);color:#c9a96e;font-family:'Cormorant Garamond',serif;font-style:italic;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid">A</div>
      <div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div>
    </div>
    <div class="iarea">
      <div class="irow">
        <textarea id="inp" placeholder="Posez votre question à Aura…" rows="1" onkeydown="hk(event)" oninput="rs(this)"></textarea>
        <button class="sbtn" onclick="send()">↑</button>
      </div>
      <div class="chips">
        <div class="chip" onclick="ins('Résume en 5 points ')">Résumer</div>
        <div class="chip" onclick="ins('Traduis en anglais : ')">Traduire</div>
        <div class="chip" onclick="ins('Améliore ce texte : ')">Améliorer</div>
        <div class="chip" onclick="ins('Crée un plan pour ')">Planifier</div>
      </div>
    </div>
  </div>
</div>
<script>
const K='REDACTED';
const M={
  general:{s:'Tu es Aura, assistant personnel élégant pour Adrien. Réponds en français, avec clarté et bienveillance. Adrien est formateur à l\'École Black Jack et membre de la loge Parfaite Amitié. Sois concis et chaleureux.'},
  pro:{s:'Tu es Aura en mode professionnel pour Adrien, formateur à l\'École Black Jack. Aide-le dans ses tâches professionnelles. Sois précis et structuré. Réponds en français.'},
  creative:{s:'Tu es Aura en mode créatif pour Adrien. Aide-le avec des projets créatifs et ses activités à la loge Parfaite Amitié. Sois inspirant. Réponds en français.'},
  plan:{s:'Tu es Aura en mode planification pour Adrien. Aide-le à organiser ses journées et formations. Sois structuré et pratique. Réponds en français.'}
};
let mode='general',hist=[],loading=false;
function setMode(m,b){mode=m;document.querySelectorAll('.mbtn').forEach(x=>x.classList.remove('active'));b.classList.add('active')}
function ins(t){const i=document.getElementById('inp');i.value=t;i.focus();rs(i)}
function rs(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px'}
function hk(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}
function gt(){return new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}
function addMsg(role,text){
  const w=document.getElementById('welcome');if(w)w.remove();
  const c=document.getElementById('msgs');
  const d=document.createElement('div');d.className='msg '+(role==='user'?'user':'ai');
  const av=document.createElement('div');av.className='av';av.textContent=role==='user'?'🧑':'A';
  const bw=document.createElement('div');
  const b=document.createElement('div');b.className='bub';
  b.innerHTML=text.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  const t=document.createElement('div');t.className='mtime';t.style.textAlign=role==='user'?'right':'left';t.textContent=gt();
  bw.appendChild(b);bw.appendChild(t);d.appendChild(av);d.appendChild(bw);c.appendChild(d);
  c.scrollTop=c.scrollHeight;
}
function st(show){const tw=document.getElementById('tw');tw.className='twrap'+(show?' show':'');document.getElementById('msgs').scrollTop=9999}
async function send(){
  if(loading)return;
  const inp=document.getElementById('inp');
  const text=inp.value.trim();if(!text)return;
  loading=true;inp.value='';rs(inp);
  addMsg('user',text);hist.push({role:'user',content:text});
  st(true);
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':K,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:M[mode].s,messages:hist})
    });
    const data=await r.json();
    const reply=data.content?.[0]?.text||'Désolé, une erreur est survenue.';
    st(false);addMsg('ai',reply);hist.push({role:'assistant',content:reply});
  }catch(e){st(false);addMsg('ai','Erreur de connexion. Vérifiez votre connexion internet.');}
  loading=false;
}
</script>
</body>
</html>
